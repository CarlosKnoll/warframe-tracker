<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Updater</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: radial-gradient(circle at top, #1a1f2b, #0c0f16);
      color: #e5e9f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      opacity: 0.6;
      text-transform: uppercase;
    }

    #status {
      font-size: 1.05rem;
      font-weight: 500;
      color: #81a1c1;
      text-align: center;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: #1b2238;
      border-radius: 4px;
      overflow: hidden;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: #5e81ac;
      border-radius: 4px;
      transition: width 0.2s ease;
    }

    #version {
      font-size: 0.8rem;
      opacity: 0.4;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #2b3248;
      border-top-color: #5e81ac;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="logo">Warframe Tracker</div>
  <div class="spinner" id="spinner"></div>
  <div id="status">Checking for updates...</div>
  <div class="progress-track hidden" id="progressTrack">
    <div id="progressBar"></div>
  </div>
  <div id="version"></div>

<script>

<script src="updater.js"></script>
</body>
</body>
</html>
